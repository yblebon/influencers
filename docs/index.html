<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src https://static-conf.vercel.app" />
  <title>Influencer Lottery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --border:    #ffffff12;
      --gold:      #c9a84c;
      --gold-dim:  #8a6b2a;
      --gold-glow: #c9a84c44;
      --text:      #f0ede8;
      --muted:     #7a7670;
      --danger:    #e05252;
      --radius:    14px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── Background grain + radial glow ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, #c9a84c18 0%, transparent 70%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 0;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }
    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 900;
      line-height: 1.05;
      background: linear-gradient(135deg, #e8d9a0 0%, #c9a84c 50%, #a07828 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .rule {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto 0;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 48px;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      box-shadow: 0 40px 80px #00000080, 0 0 0 1px #ffffff06;
    }

    /* ── Drum ── */
    .drum {
      width: 100%;
      height: 110px;
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 10px;
      display: none;
      align-items: center;
      justify-content: space-evenly;
      overflow: hidden;
      position: relative;
    }
    .drum::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, #0d0d14 100%);
      pointer-events: none;
    }

    .ball {
      width: 88px; height: 88px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      line-height: 1.2;
      padding: 8px;
      word-break: break-word;
      animation: float 1.6s ease-in-out infinite alternate;
    }
    .ball-a {
      background: radial-gradient(circle at 35% 35%, #4f8ef7, #1a4ab0);
      box-shadow: 0 4px 20px #1a4ab055, inset 0 1px 0 #ffffff30;
      animation-delay: 0s;
    }
    .ball-b {
      background: radial-gradient(circle at 35% 35%, #f76fa0, #b01a50);
      box-shadow: 0 4px 20px #b01a5055, inset 0 1px 0 #ffffff30;
      animation-delay: 0.4s;
    }
    @keyframes float {
      from { transform: translateY(-8px) rotate(-3deg); }
      to   { transform: translateY( 8px) rotate( 3deg); }
    }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 36px; height: 36px;
      border: 3px solid #ffffff10;
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Draw button ── */
    .draw-btn {
      width: 100%;
      padding: 16px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--bg);
      background: linear-gradient(135deg, #e8d9a0, #c9a84c 50%, #a07828);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .draw-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #ffffff30, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .draw-btn:hover:not(:disabled)::after { opacity: 1; }
    .draw-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px var(--gold-glow); }
    .draw-btn:active:not(:disabled)  { transform: translateY(0); }
    .draw-btn:disabled {
      background: #2a2a35;
      color: var(--muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── Status ── */
    .status {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
      min-height: 20px;
      text-align: center;
    }
    .status.error { color: var(--danger); }

    /* ── Winner card ── */
    .winner-panel {
      width: 100%;
      background: #0d0d14;
      border: 1px solid var(--gold-dim);
      border-radius: 10px;
      padding: 24px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: reveal 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    @keyframes reveal {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    .winner-label {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .winner-avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--gold-dim);
      box-shadow: 0 0 0 4px var(--gold-glow), 0 8px 24px #00000060;
      display: block;
    }
    .winner-avatar.hidden { display: none; }

    .winner-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      color: var(--text);
    }

    /* ── Tags ── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .tag {
      background: #1e1e2a;
      border: 1px solid var(--border);
      color: #b8b4ae;
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 400;
    }

    /* ── Social icons ── */
    .socials {
      display: flex;
      gap: 10px;
    }
    .social-link {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: var(--transition);
      border: 1px solid var(--border);
    }
    .social-link:hover { transform: scale(1.12); border-color: var(--gold-dim); }
    .social-link svg { width: 16px; height: 16px; fill: var(--muted); transition: fill 0.2s; }
    .social-link:hover svg { fill: var(--gold); }
    .s-x  { background: #111; }
    .s-li { background: #0a1929; }
    .s-yt { background: #1a0a0a; }

    /* ── Error banner ── */
    .error-banner {
      background: #2a1010;
      border: 1px solid #5a2020;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 13px;
      color: var(--danger);
      text-align: center;
      display: none;
    }

    /* ── Participant count ── */
    .count-badge {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .count-badge span { color: var(--gold); font-weight: 500; }
  </style>
</head>
<body>
  <main class="page" role="main">

    <header class="header">
      <p class="eyebrow">Grand Draw</p>
      <h1>Influencer Lottery</h1>
      <div class="rule"></div>
    </header>

    <div class="card">

      <!-- Error banner -->
      <div class="error-banner" id="errorBanner" role="alert"></div>

      <!-- Drum animation -->
      <div class="drum" id="drum" aria-hidden="true">
        <div class="ball ball-a" id="ballA"></div>
        <div class="ball ball-b" id="ballB"></div>
      </div>

      <!-- Spinner -->
      <div class="spinner" id="spinner" aria-hidden="true"></div>

      <!-- Status -->
      <p class="status" id="status" aria-live="polite" aria-atomic="true">Loading participants…</p>

      <!-- Participant count -->
      <p class="count-badge" id="countBadge" aria-live="polite"></p>

      <!-- Draw button -->
      <button class="draw-btn" id="drawBtn" disabled aria-label="Draw a winner">
        Loading…
      </button>

      <!-- Winner panel -->
      <section class="winner-panel" id="winnerPanel" aria-live="assertive" aria-atomic="true">
        <p class="winner-label">🏆 Winner</p>
        <img class="winner-avatar hidden" id="winnerAvatar" src="" alt="" />
        <h2 class="winner-name" id="winnerName"></h2>
        <div class="tags" id="winnerTags"></div>
        <div class="socials" id="winnerSocials"></div>
      </section>

    </div>
  </main>

  <script>
    'use strict';

    /* ── Config ── */
    const API_URL  = 'https://static-conf.vercel.app/go/influencers';
    const DRAW_DURATION_MS = 3000;
    const MAX_RETRIES = 3;

    /* ── SVG icons (safe, no user data injected) ── */
    const SVG = {
      x: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
      li: '<svg viewBox="0 0 24 24"><path d="M19 0h-14C2.239 0 0 2.239 0 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5V5c0-2.761-2.238-5-5-5zm-11 19H5V8h3v11zm-1.5-12.268A1.75 1.75 0 0 1 4.75 5a1.75 1.75 0 1 1 0 3.5A1.75 1.75 0 0 1 6.5 6.732zM20 19h-3v-5.604c0-3.368-4-3.113-4 0V19h-3V8h3v1.765C14.396 7.179 20 6.988 20 12.24V19z"/></svg>',
      yt: '<svg viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0C.488 3.45.029 5.804 0 12c.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0C23.512 20.55 23.971 18.196 24 12c-.029-6.185-.484-8.549-4.385-8.816zM9 16V8l8 4-8 4z"/></svg>',
    };

    /* ── State ── */
    let participants = [];
    let isDrawing = false;
    let ballInterval = null;

    /* ── DOM refs ── */
    const drawBtn      = document.getElementById('drawBtn');
    const statusEl     = document.getElementById('status');
    const countBadge   = document.getElementById('countBadge');
    const drum         = document.getElementById('drum');
    const ballA        = document.getElementById('ballA');
    const ballB        = document.getElementById('ballB');
    const spinner      = document.getElementById('spinner');
    const winnerPanel  = document.getElementById('winnerPanel');
    const winnerAvatar = document.getElementById('winnerAvatar');
    const winnerName   = document.getElementById('winnerName');
    const winnerTags   = document.getElementById('winnerTags');
    const winnerSocials= document.getElementById('winnerSocials');
    const errorBanner  = document.getElementById('errorBanner');

    /* ── Utilities ── */

    /** Safely set text on an element (never innerHTML for user data) */
    function setText(el, text) {
      el.textContent = String(text ?? '');
    }

    /** Validate that a string is a safe HTTPS URL */
    function isSafeUrl(str) {
      if (typeof str !== 'string' || !str.trim()) return false;
      try {
        const u = new URL(str);
        return u.protocol === 'https:';
      } catch { return false; }
    }

    /** Show a recoverable error to the user */
    function showError(msg) {
      errorBanner.style.display = 'block';
      setText(errorBanner, msg);
    }
    function hideError() {
      errorBanner.style.display = 'none';
      setText(errorBanner, '');
    }

    /** Pick a random element from an array */
    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    /* ── Data loading with retry ── */
    async function fetchWithRetry(url, retries = MAX_RETRIES) {
      for (let attempt = 1; attempt <= retries; attempt++) {
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return await res.json();
        } catch (err) {
          if (attempt === retries) throw err;
          await new Promise(r => setTimeout(r, 800 * attempt)); // back-off
        }
      }
    }

    async function loadParticipants() {
      setText(statusEl, 'Loading participants…');
      try {
        const data = await fetchWithRetry(API_URL);

        if (!Array.isArray(data) || data.length === 0) {
          throw new Error('Participant list is empty or malformed.');
        }

        participants = data;
        drawBtn.disabled = false;
        setText(drawBtn, 'Draw a Winner');
        setText(statusEl, 'Ready to draw!');
        setText(countBadge, '');
        countBadge.innerHTML = `<span>${participants.length}</span> participants registered`;
        hideError();
      } catch (err) {
        console.error('Failed to load participants:', err);
        setText(statusEl, '');
        showError(`Could not load participants. ${err.message}`);
        drawBtn.disabled = false;
        setText(drawBtn, 'Retry');
        drawBtn.onclick = () => { hideError(); loadParticipants(); };
      }
    }

    /* ── Ball animation ── */
    function rotateBalls() {
      if (participants.length === 0) return;
      const a = pick(participants);
      const b = pick(participants.filter(p => p !== a) || participants);
      setText(ballA, a.name ?? '?');
      setText(ballB, b.name ?? '?');
    }

    /* ── Draw logic ── */
    function startDraw() {
      if (isDrawing || participants.length === 0) return;
      isDrawing = true;

      // Reset UI
      hideError();
      drawBtn.disabled = true;
      setText(drawBtn, 'Drawing…');
      setText(statusEl, 'Selecting a winner…');
      winnerPanel.style.display = 'none';
      drum.style.display = 'flex';
      spinner.style.display = 'block';

      rotateBalls();
      ballInterval = setInterval(rotateBalls, 280);

      setTimeout(() => {
        try {
          clearInterval(ballInterval);
          ballInterval = null;
          drum.style.display = 'none';
          spinner.style.display = 'none';

          const winner = pick(participants);

          if (!winner || typeof winner !== 'object') {
            throw new Error('Invalid winner data received.');
          }

          renderWinner(winner);
          setText(statusEl, 'Winner selected!');
        } catch (err) {
          console.error('Draw error:', err);
          setText(statusEl, '');
          showError(`Something went wrong during the draw. Please try again.`);
        } finally {
          isDrawing = false;
          drawBtn.disabled = false;
          setText(drawBtn, 'Draw Again');
        }
      }, DRAW_DURATION_MS);
    }

    /* ── Render winner ── */
    function renderWinner(winner) {
      // Name (safe text)
      const name = typeof winner.name === 'string' ? winner.name : 'Unknown';
      setText(winnerName, name);

      // Avatar (validate URL before setting src)
      if (isSafeUrl(winner.image)) {
        winnerAvatar.src = winner.image;
        winnerAvatar.alt = `${name}'s profile picture`;
        winnerAvatar.classList.remove('hidden');
        winnerAvatar.onerror = () => winnerAvatar.classList.add('hidden');
      } else {
        winnerAvatar.classList.add('hidden');
      }

      // Tags (safe text only — no innerHTML for tag content)
      winnerTags.innerHTML = '';
      const facts = Array.isArray(winner.funnyFacts) ? winner.funnyFacts : [];
      facts.forEach(fact => {
        if (typeof fact !== 'string') return;
        const span = document.createElement('span');
        span.className = 'tag';
        setText(span, fact);          // textContent, never innerHTML
        winnerTags.appendChild(span);
      });

      // Social links (validated URLs, icon SVG is static)
      winnerSocials.innerHTML = '';
      const links = [
        { url: winner.xLink,    cls: 's-x',  svg: SVG.x,  label: 'X (Twitter)' },
        { url: winner.linkedin, cls: 's-li', svg: SVG.li, label: 'LinkedIn' },
        { url: winner.youtube,  cls: 's-yt', svg: SVG.yt, label: 'YouTube' },
      ];
      links.forEach(({ url, cls, svg, label }) => {
        if (!isSafeUrl(url)) return;
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = `social-link ${cls}`;
        a.setAttribute('aria-label', `${name} on ${label}`);
        a.innerHTML = svg;             // safe — svg is a static const, not user data
        winnerSocials.appendChild(a);
      });

      winnerPanel.style.display = 'flex';
    }

    /* ── Bootstrap ── */
    drawBtn.addEventListener('click', () => {
      // On first load the button can be a "Retry" — handle both draw and retry
      if (participants.length === 0) return;
      startDraw();
    });

    loadParticipants();
  </script>
</body>
</html>
